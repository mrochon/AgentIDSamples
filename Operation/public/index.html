<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Agent Identity Token Tester</title>
    <style>
      :root {
        --bg: #f7f3ea;
        --fg: #2b2b2b;
        --accent: #2a6b5f;
        --accent2: #4a5a8f;
        --panel: #ffffff;
        --code-bg: #f0f0e8;
        --border: #d6d1c8;
        --err-bg: #fdf2f2;
        --err-border: #e8b4b4;
        --err-fg: #8b1a1a;
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        background: radial-gradient(circle at 20% 20%, #ffffff, var(--bg));
        color: var(--fg);
      }

      .wrap { max-width: 960px; margin: 36px auto; padding: 0 20px 40px; }

      h1 { font-size: 28px; margin: 0 0 24px; }
      h2 { font-size: 18px; margin: 0 0 12px; border-bottom: 1px solid var(--border); padding-bottom: 6px; }

      .card {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px;
        margin-bottom: 24px;
      }

      label { display: block; font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #555; }

      input[type="text"] {
        width: 100%;
        padding: 7px 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        font-family: "Courier New", monospace;
        font-size: 13px;
        margin-bottom: 10px;
      }

      .url-box {
        background: var(--code-bg);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 12px;
        font-family: "Courier New", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-all;
        margin-bottom: 12px;
        min-height: 36px;
        color: #333;
      }

      button {
        border: 0;
        padding: 10px 18px;
        border-radius: 6px;
        font-size: 15px;
        cursor: pointer;
        color: #fff;
        margin-right: 8px;
        margin-bottom: 4px;
      }
      .btn-step1 { background: var(--accent); }
      .btn-step2 { background: var(--accent2); }
      .btn-step3 { background: #7a4a8f; }

      .grid2 {
        display: grid;
        grid-template-columns: 1fr;
        gap: 12px;
        margin-top: 14px;
      }
      @media (min-width: 700px) { .grid2 { grid-template-columns: 1fr 1fr; } }

      textarea {
        width: 100%;
        min-height: 160px;
        resize: vertical;
        padding: 10px;
        border-radius: 6px;
        border: 1px solid var(--border);
        background: var(--panel);
        font-family: "Courier New", monospace;
        font-size: 12px;
      }

      .error-box {
        display: none;
        margin-top: 10px;
        padding: 10px 14px;
        border-radius: 6px;
        background: var(--err-bg);
        border: 1px solid var(--err-border);
        color: var(--err-fg);
        font-family: "Courier New", monospace;
        font-size: 12px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .row2 { display: flex; gap: 12px; flex-wrap: wrap; }
      .row2 > div { flex: 1 1 260px; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Agent Identity Token Tester</h1>

      <!-- Config -->
      <div class="card">
        <h2>Configuration</h2>
        <div class="row2">
          <div>
            <label>TENANT_ID</label>
            <input id="tenantId" type="text" placeholder="Entra tenant ID" />
            <label>Managed Identity ID <small style="font-weight:normal;opacity:.7">(AZURE_CLIENT_ID)</small></label>
            <input id="managedIdentityId" type="text" placeholder="Injected from managed identity client ID" readonly style="opacity:.8;cursor:default" />
            <label>MI_OBJECT_ID <small style="font-weight:normal;opacity:.7">(Managed Identity Object Id)</small></label>
            <input id="miObjectId" type="text" placeholder="Object ID of the managed identity" />
          </div>
          <div>
            <label>BLUEPRINT_APP_ID</label>
            <input id="blueprintAppId" type="text" placeholder="Client ID of the blueprint app" />
            <label>Agent Object Id</label>
            <input id="agentObjectId" type="text" placeholder="Agent object ID" />
          </div>
        </div>
      </div>

      <!-- Step 1 -->
      <div class="card">
        <h2>Step 1 — Get MI token</h2>
        <label>Request URL</label>
        <div id="step1Url" class="url-box">Resolving...</div>
        <button class="btn-step1" id="btnStep1">Get MI token</button>
        <div id="step1Error" class="error-box"></div>
        <div class="grid2">
          <div>
            <label>Raw token</label>
            <textarea id="step1Token" readonly placeholder="Assertion token appears here"></textarea>
          </div>
          <div>
            <label>Decoded token body</label>
            <textarea id="step1Decoded" readonly placeholder="Decoded body appears here"></textarea>
          </div>
        </div>
      </div>

      <!-- Step 2 -->
      <div class="card">
        <h2>Step 2 — Get Blueprint token</h2>
        <label>POST URL</label>
        <div id="step2Url" class="url-box">Resolving...</div>
        <label>Request body</label>
        <div id="step2Body" class="url-box">Waiting for Step 1...</div>
        <button class="btn-step2" id="btnStep2">Get Blueprint token</button>
        <div id="step2Error" class="error-box"></div>
        <div class="grid2">
          <div>
            <label>Raw token</label>
            <textarea id="step2Token" readonly placeholder="Graph token appears here"></textarea>
          </div>
          <div>
            <label>Decoded token body</label>
            <textarea id="step2Decoded" readonly placeholder="Decoded body appears here"></textarea>
          </div>
        </div>
      </div>

      <!-- Step 3 -->
      <div class="card">
        <h2>Step 3 — Acquire autonomous agent token</h2>
        <label>POST URL</label>
        <div id="step3Url" class="url-box">Resolving...</div>
        <label>Request body</label>
        <div id="step3Body" class="url-box">Waiting for Step 2...</div>
        <button class="btn-step3" id="btnStep3">Get agent resource token</button>
        <div id="step3Error" class="error-box"></div>
        <div class="grid2">
          <div>
            <label>Raw token</label>
            <textarea id="step3Token" readonly placeholder="Agent token appears here"></textarea>
          </div>
          <div>
            <label>Decoded token body</label>
            <textarea id="step3Decoded" readonly placeholder="Decoded body appears here"></textarea>
          </div>
        </div>
      </div>
    </div>

    <script>
      const $ = id => document.getElementById(id);

      const inManagedIdentityId = $("managedIdentityId");
      const inBlueprintAppId    = $("blueprintAppId");
      const inTenantId          = $("tenantId");
      const inAgentObjectId      = $("agentObjectId");

      let resolvedEndpoint    = "";
      let step1Assertion      = "";
      let step2BlueprintToken = "";

      function showError(boxId, data) {
        const box = $(boxId);
        const d = data.details || {};
        const lines = [];
        if (data.error)   lines.push("Error: " + data.error);
        if (d.message)    lines.push("Message: " + (typeof d.message === "object" ? JSON.stringify(d.message) : d.message));
        if (d.statusCode) lines.push("HTTP status: " + d.statusCode);
        if (d.raw)        lines.push("\nRaw response:\n" + JSON.stringify(d.raw, null, 2));
        if (d.stack)      lines.push("\nStack:\n" + d.stack);
        box.textContent = lines.join("\n");
        box.style.display = "block";
      }

      function clearError(boxId) {
        const b = $(boxId);
        b.textContent = "";
        b.style.display = "none";
      }

      function buildStep1Url() {
        const mid = inManagedIdentityId.value.trim();
        if (!resolvedEndpoint) { $("step1Url").textContent = "Waiting for IDENTITY_ENDPOINT from server..."; return; }
        if (!mid)              { $("step1Url").textContent = "Enter Managed Identity ID above."; return; }
        const p = new URLSearchParams({
          resource:      "api://AzureADTokenExchange",
          client_id:     mid,
          "api-version": "2019-08-01"
        });
        $("step1Url").textContent = "GET " + resolvedEndpoint + "?" + p;
      }

      function buildStep2Preview() {
        const tid = inTenantId.value.trim();
        const bid = inBlueprintAppId.value.trim();
        const fmi = inAgentObjectId.value.trim();
        if (!tid || !bid) { $("step2Url").textContent = "Enter Tenant ID and BLUEPRINT_APP_ID above."; $("step2Body").textContent = ""; return; }
        $("step2Url").textContent = "POST https://login.microsoftonline.com/" + tid + "/oauth2/v2.0/token";
        const bodyLines = [
          "grant_type=client_credentials",
          "client_id=" + (bid || "<blueprintAppId>"),
          "scope=api://AzureADTokenExchange/.default",
          "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer",
          "client_assertion=" + (step1Assertion ? step1Assertion.substring(0, 40) + "..." : "<run Step 1 first>"),
          "fmi_path=" + (fmi || "<agentObjectId>")
        ];
        $("step2Body").textContent = bodyLines.join("\n");
      }

      [inManagedIdentityId, inBlueprintAppId, inTenantId, inAgentObjectId].forEach(el => {
        el.addEventListener("input", () => { buildStep1Url(); buildStep2Preview(); buildStep3Preview(); });
      });

      fetch("/api/config")
        .then(r => r.json())
        .then(d => {
          resolvedEndpoint          = d.endpoint;
          inManagedIdentityId.value = d.managedIdentityId;
          inBlueprintAppId.value    = d.blueprintAppId;
          inAgentObjectId.value     = d.agentObjectId;
          $('miObjectId').value     = d.miObjectId;
          inTenantId.value          = d.tenantId;
          buildStep1Url();
          buildStep2Preview();
          buildStep3Preview();
        })
        .catch(() => { $("step1Url").textContent = "Failed to load config from server."; });

      $("btnStep1").addEventListener("click", async () => {
        clearError("step1Error");
        $("step1Token").value   = "Requesting...";
        $("step1Decoded").value = "";
        step1Assertion      = "";
        step2BlueprintToken = "";
        buildStep2Preview();
        buildStep3Preview();

        try {
          const p = new URLSearchParams({
            managedIdentityId: inManagedIdentityId.value.trim()
          });
          const r = await fetch("/api/step1?" + p);
          const d = await r.json();
          if (!r.ok) { $("step1Token").value = ""; showError("step1Error", d); return; }
          $("step1Token").value   = d.token;
          $("step1Decoded").value = JSON.stringify(d.decoded, null, 2);
          step1Assertion          = d.token;
          buildStep2Preview();
        } catch (e) {
          $("step1Token").value = "";
          showError("step1Error", { error: String(e) });
        }
      });

      $("btnStep2").addEventListener("click", async () => {
        clearError("step2Error");
        $("step2Token").value   = "Requesting...";
        $("step2Decoded").value = "";
        step2BlueprintToken = "";
        buildStep3Preview();

        if (!step1Assertion) {
          showError("step2Error", { error: "Run Step 1 first to obtain the assertion token." });
          $("step2Token").value = "";
          return;
        }

        try {
          const r = await fetch("/api/step2", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              tenantId:       inTenantId.value.trim(),
              blueprintAppId: inBlueprintAppId.value.trim(),
              agentObjectId:  inAgentObjectId.value.trim(),
              assertion:      step1Assertion
            })
          });
          const d = await r.json();
          if (!r.ok) { $("step2Token").value = ""; showError("step2Error", d); return; }
          $("step2Token").value   = d.token;
          $("step2Decoded").value = JSON.stringify(d.decoded, null, 2);
          step2BlueprintToken     = d.token;
          buildStep3Preview();
        } catch (e) {
          $("step2Token").value = "";
          showError("step2Error", { error: String(e) });
        }
      });

      function buildStep3Preview() {
        const tid = inTenantId.value.trim();
        const bid = inBlueprintAppId.value.trim();
        const aid = inAgentObjectId.value.trim();
        if (!tid || !bid) { $("step3Url").textContent = "Enter Tenant ID and BLUEPRINT_APP_ID above."; $("step3Body").textContent = ""; return; }
        $("step3Url").textContent = "POST https://login.microsoftonline.com/" + tid + "/oauth2/v2.0/token";
        const bodyLines = [
          "client_id=" + (aid || "<agentObjectId>"),
          "scope=https://graph.microsoft.com/.default",
          "client_assertion_type=urn:ietf:params:oauth:client-assertion-type:jwt-bearer",
          "client_assertion=" + (step2BlueprintToken ? step2BlueprintToken.substring(0, 40) + "..." : "<run Step 2 first>"),
          "grant_type=client_credentials"
        ];
        $("step3Body").textContent = bodyLines.join("\n");
      }

      $("btnStep3").addEventListener("click", async () => {
        clearError("step3Error");
        $("step3Token").value   = "Requesting...";
        $("step3Decoded").value = "";

        if (!step2BlueprintToken) {
          showError("step3Error", { error: "Run Step 2 first to obtain the blueprint token." });
          $("step3Token").value = "";
          return;
        }

        try {
          const r = await fetch("/api/step3", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              tenantId:       inTenantId.value.trim(),
              blueprintAppId: inBlueprintAppId.value.trim(),
              agentObjectId:  inAgentObjectId.value.trim(),
              assertion:      step2BlueprintToken
            })
          });
          const d = await r.json();
          if (!r.ok) { $("step3Token").value = ""; showError("step3Error", d); return; }
          $("step3Token").value   = d.token;
          $("step3Decoded").value = JSON.stringify(d.decoded, null, 2);
        } catch (e) {
          $("step3Token").value = "";
          showError("step3Error", { error: String(e) });
        }
      });
    </script>
  </body>
</html>
